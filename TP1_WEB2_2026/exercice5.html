<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <title>TP JavaScript</title>
    </head>
    <body>
        <h1>Exercice 5</h1>
    <!-- Votre contenu HTML ici -->
        <h1>Ma fiche de présentation</h1>
        <p id="nomComplet"></p>
        <p id="age"></p>
        <p id="ville"></p>
        <p id="presentation"></p>

        <script>
      // Votre code JavaScript ici
            let prenom = "Ahmed";
            let nom = "Tamane";
            let age = 19;
            let ville = "Marrakech";

            document.getElementById("nomComplet").innerHTML = prenom + " " + nom;
            document.getElementById("age").innerHTML = "Age :  " + age + "ans";
            document.getElementById("ville").innerHTML = "ville : " + ville;

            document.getElementById("presentation").innerHTML =
                "Je m'appelle " + prenom + " " + nom +
                ", j'ai " + age + " ans et j'habite à " + ville + ".";

            // le changement dynamique
            document.title = "Fiche de " + prenom;
        </script>
    </body>
</html>
